
trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  nodeVersion: '18.x'

  # Azure Details
  azureServiceConnection: 'azure-connection'
  webAppName: 'Abhi-web-app_group'

stages:

# =====================================================
# STAGE 1 : BUILD
# =====================================================
- stage: Build
  displayName: 'Build React App'

  jobs:
  - job: BuildJob
    displayName: 'Install and Build'

    steps:

    # Install Node.js
    - task: NodeTool@0
      inputs:
        versionSpec: '$(nodeVersion)'
      displayName: 'Install Node.js'

    # Verify Node & npm
    - script: |
        node -v
        npm -v
      displayName: 'Verify Node Version'

    # Install dependencies
    - script: |
        npm install
      displayName: 'Install Dependencies'

    # Build React app
    - script: |
        npm run build
      displayName: 'Build React Application'

    # Verify build folder
    - script: |
        echo "Build folder contents:"
        ls -R build
      displayName: 'Verify Build Output'

    # Archive build folder
    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: 'build'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/react-app.zip'
        replaceExistingArchive: true
      displayName: 'Archive Build Files'

    # Publish artifact
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/react-app.zip'
        ArtifactName: 'react-build'
        publishLocation: 'Container'
      displayName: 'Publish Artifact'


# =====================================================
# STAGE 2 : DEPLOY
# =====================================================
- stage: Deploy
  displayName: 'Deploy to Azure'
  dependsOn: Build

  jobs:
  - deployment: DeployReactApp
    displayName: 'Deploy React App'

    environment: 'production'

    strategy:
      runOnce:
        deploy:
          steps:

          # Download artifact
          - task: DownloadBuildArtifacts@0
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'react-build'
              downloadPath: '$(Pipeline.Workspace)'
            displayName: 'Download Artifact'

          # Verify downloaded artifact
          - script: |
              echo "Pipeline Workspace:"
              ls -R $(Pipeline.Workspace)
            displayName: 'Verify Downloaded Files'

          # Deploy to Azure App Service
          - task: AzureWebApp@1
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              appType: 'webAppLinux'
              appName: '$(webAppName)'
              package: '$(Pipeline.Workspace)/react-build/react-app.zip'
              runtimeStack: 'NODE|20-lts'
            displayName: 'Deploy to Azure Web App'

