trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  nodeVersion: '18.x'
  azureServiceConnection: 'azure-connection'
  webAppName: 'abhi-react-webapp'

stages:

# =====================================================
# BUILD STAGE
# =====================================================
- stage: Build
  displayName: Build React App

  jobs:
  - job: BuildJob
    displayName: Build

    steps:

    - task: NodeTool@0
      inputs:
        versionSpec: '$(nodeVersion)'
      displayName: Install Node.js

    - script: |
        node -v
        npm -v
      displayName: Verify Node Installation

    - script: |
        npm install
      displayName: Install Dependencies

    - script: |
        npm run build
      displayName: Build React Application

    - script: |
        echo "Build Output"
        ls -la build
      displayName: Verify Build Output

    - task: ArchiveFiles@2
      displayName: Create Deployment ZIP
      inputs:
        rootFolderOrFile: 'build'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/react-build.zip'
        replaceExistingArchive: true

    - task: PublishBuildArtifacts@1
      displayName: Publish Artifact
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/react-build.zip'
        ArtifactName: 'react-build'
        publishLocation: 'Container'

# =====================================================
# DEPLOY STAGE
# =====================================================
- stage: Deploy
  displayName: Deploy To Azure
  dependsOn: Build

  jobs:
  - deployment: DeployReactApp
    displayName: Deploy React App
    environment: production

    strategy:
      runOnce:
        deploy:
          steps:

          - task: DownloadBuildArtifacts@0
            displayName: Download Artifact
            inputs:
              buildType: current
              downloadType: single
              artifactName: react-build
              downloadPath: '$(Pipeline.Workspace)'

          - script: |
              echo "Downloaded files:"
              find $(Pipeline.Workspace) -type f
            displayName: Verify Downloaded Artifact

          - task: AzureWebApp@1
            displayName: Deploy To Azure App Service
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              appType: 'webAppLinux'
              appName: '$(webAppName)'
              package: '$(Pipeline.Workspace)/react-build/react-build.zip'
              deploymentMethod: 'zipDeploy'
