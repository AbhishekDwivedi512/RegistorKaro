trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  nodeVersion: '18.x'

  # Azure Details
  azureServiceConnection: 'azure-connection'
  webAppName: 'abhi-react-webapp'

stages:

# =====================================================
# STAGE 1 : BUILD
# =====================================================
- stage: Build
  displayName: 'Build React App'

  jobs:
  - job: BuildJob
    displayName: 'Install and Build'

    steps:

    # Use Node.js
    - task: UseNode@1
      inputs:
        version: '18.x'
      displayName: 'Use Node.js 18'

    # Verify Node version
    - script: |
        node -v
        npm -v
        which node
      displayName: 'Verify Node Version'

    # Install dependencies
    - script: |
        npm install
      displayName: 'Install Dependencies'

    # Build application
    - script: |
        npm run build
      displayName: 'Build React Application'

    # Verify build folder
    - script: |
        ls -la
        ls -la build
      displayName: 'Verify Build Output'

    # Create ZIP package
    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: 'build'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/react-app.zip'
        replaceExistingArchive: true
      displayName: 'Create ZIP Package'

    # Verify ZIP file
    - script: |
        ls -la $(Build.ArtifactStagingDirectory)
      displayName: 'Verify ZIP File'

    # Publish artifact
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/react-app.zip'
        ArtifactName: 'react-build'
        publishLocation: 'Container'
      displayName: 'Publish Artifact'


# =====================================================
# STAGE 2 : DEPLOY
# =====================================================
- stage: Deploy
  displayName: 'Deploy to Azure'
  dependsOn: Build

  jobs:
  - deployment: DeployReactApp
    displayName: 'Deploy React App'

    environment: 'production'

    strategy:
      runOnce:
        deploy:
          steps:

          # Download artifact
          - task: DownloadBuildArtifacts@0
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'react-build'
              downloadPath: '$(Pipeline.Workspace)'
            displayName: 'Download Artifact'

          # Verify downloaded files
          - script: |
              echo "Pipeline Workspace:"
              ls -R $(Pipeline.Workspace)
            displayName: 'Check Downloaded Files'

          # Deploy to Azure App Service
          - task: AzureWebApp@1
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              appType: 'webAppLinux'
              appName: '$(webAppName)'
              package: '$(Pipeline.Workspace)/react-build/react-app.zip'
            displayName: 'Deploy to Azure Web App'
